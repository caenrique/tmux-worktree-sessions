name: demo

# Render demo/readme.tape and upload the resulting GIF to the
# `demo-assets` GitHub release. The README links to that release URL,
# so this workflow is what keeps the embedded demo in sync with the
# tape source.
#
# Triggers:
#   - workflow_dispatch       — manual re-render from any branch
#   - push to main (demo/**)  — auto re-render when demo source changes
#   - pull_request (demo/**)  — render-only smoke check (no publish)
#
# Linux-only: VHS runs headless on ubuntu-latest. macOS rendering
# would just bloat CI minutes — the GIF is platform-independent.
#
# Temporary workaround (matches .github/workflows/tests.yml): install
# runtime deps directly instead of via `devenv tasks run demo:render`.
# Devenv-on-CI has been failing with sporadic `path '...' is not valid`
# errors during shell evaluation, caused by a Nix garbage-collector
# race fixed in NixOS/nix#15992 (merged 2026-06-07) but not yet in any
# Nix release. Once a Nix release containing the fix ships, revert to
# the devenv-based flow.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - demo/**
      - .github/workflows/demo.yml
  pull_request:
    paths:
      - demo/**
      - .github/workflows/demo.yml

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      # Needed by `gh release upload` in demo/publish.sh.
      contents: write
    steps:
      - uses: actions/checkout@v5

      # Runtime deps the demo shells out to: tmux/fzf/fd/git for the
      # plugin under test, ffmpeg for VHS encoding, plus VHS itself
      # (and ttyd, which VHS drives) from the charmbracelet apt repo.
      - name: Install runtime deps
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" \
            | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y tmux fzf fd-find ffmpeg vhs ttyd
          # Ubuntu ships fd as `fdfind` to avoid clashing with chronyc;
          # the plugin invokes it as `fd`, so expose it under that name.
          sudo ln -s "$(command -v fdfind)" /usr/local/bin/fd

      - name: Render demo GIF
        run: bash demo/setup.sh && vhs demo/readme.tape

      # Always upload as a workflow artifact so PRs can preview the
      # rendered output without publishing.
      - name: Upload GIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: readme-gif
          path: /tmp/tws-demo/readme.gif
          if-no-files-found: error

      # Only publish on push-to-main and manual dispatch. Pull
      # requests stop at the artifact above.
      - name: Publish to GitHub release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash demo/publish.sh
