name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bats:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: bats-core/bats-action@3.0.0
        with:
          bats-version: 1.11.0
          support-install: false
          assert-install: false
          file-install: false
          detik-install: false

      - name: Install tmux and fzf (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux fzf

      - name: Install tmux and fzf (macOS)
        if: runner.os == 'macOS'
        run: brew install tmux fzf

      - name: Run bats tests
        run: bats --print-output-on-failure --recursive tests/

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: '.'
          ignore_paths: tests
          additional_files: 'tmux-sessions.tmux'
        env:
          SHELLCHECK_OPTS: -x

      - name: Lint test helpers
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: './tests'
          ignore_names: '*.bats'
        env:
          SHELLCHECK_OPTS: -x
