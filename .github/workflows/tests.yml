# Temporary workaround: CI runs the dev tasks directly instead of via
# `devenv test`. Devenv-on-CI has been failing with sporadic `path '...' is
# not valid` errors during shell evaluation, caused by a Nix garbage-collector
# race fixed in NixOS/nix#15992 (merged 2026-06-07) but not yet in any Nix
# release. Once a Nix release containing the fix ships and cachix/install-nix-action
# picks it up, revert this file to the devenv-based flow.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Runtime deps the plugin shells out to during tests: fd is invoked by
      # git.list_git_projects; tmux and fzf are touched by integration tests.
      # Plus shellcheck for the bash entry point. devenv.nix provides these
      # in the local shell; CI installs them directly.
      - name: Install runtime deps
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y shellcheck fd-find tmux fzf
            # Ubuntu ships fd as `fdfind` to avoid clashing with chronyc; the
            # plugin invokes it as `fd`, so expose it under that name.
            sudo ln -s "$(command -v fdfind)" /usr/local/bin/fd
          else
            brew install shellcheck fd tmux fzf
          fi

      - run: uv sync

      - name: pytest
        run: uv run pytest tests/python

      - name: ruff lint
        run: uv run ruff check scripts/ tests/python

      - name: ruff format check
        run: uv run ruff format --check scripts/ tests/python

      - name: mypy
        run: uv run mypy scripts/tmux_worktree_sessions

      - name: shellcheck
        run: shellcheck --severity=warning tmux-worktree-sessions.tmux
