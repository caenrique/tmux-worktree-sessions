name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bats:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: bats-core/bats-action@3.0.0
        with:
          bats-version: 1.11.0
          support-install: false
          assert-install: false
          file-install: false
          detik-install: false

      - name: Install tmux, fzf, and fd (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y tmux fzf fd-find
          sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd

      - name: Install tmux, fzf, and fd (macOS)
        if: runner.os == 'macOS'
        run: brew install tmux fzf fd

      - name: Run bats tests
        run: make test

  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install fd (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y fd-find
          sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd

      - name: Install fd (macOS)
        if: runner.os == 'macOS'
        run: brew install fd

      - name: Install Python dev dependencies
        run: pip install pytest pytest-mock ruff mypy

      - name: Run Python checks
        run: make py-check

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: make lint
