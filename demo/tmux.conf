# Minimal tmux config for the README demo. Loads the plugin from the
# current checkout (no TPM) and points it at the throwaway fixture.

set -g default-terminal "tmux-256color"

# Force panes spawned by the demo to use bash with the seeded rc file
# in $HOME (which demo/setup.sh writes). Otherwise tmux uses the user's
# default shell (zsh) which tries to load files outside this fixture.
set -g default-shell /bin/bash
set -g default-command "/bin/bash"

# Status bar — shows the current session name on the left so viewers
# can see the session switch when the plugin creates a new worktree
# session. Right side carries a rolling key-hint that demo/readme.tape
# updates via `tmux display-message` before each keymap action.
set -g status on
set -g status-bg "#1e1e2e"
set -g status-fg "#cdd6f4"
set -g status-interval 1
set -g status-left-length 60
set -g status-right-length 80
# status-left uses the plugin's `#{session_display_name}` widget — at
# plugin load time, tmux-worktree-sessions.tmux rewrites the placeholder
# into a shell-command that runs `sessions display-name` against the
# current session path/name. That gives nicer rendering than raw `#S`
# (e.g. "webapp/feature-demo-readme" with icon and color) so the
# session-switch in the demo is unmistakable.
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #{session_display_name}  #[default] "
set -g status-right "#[fg=#a6adc8]tmux-worktree-sessions demo  "
# Hide the per-window list — the demo runs in a single window and the
# `0:bash*` chip would only add noise next to the session display name.
set -g window-status-format ""
set -g window-status-current-format ""
set -g message-style "bg=#f9e2af,fg=#1e1e2e,bold"
set -g display-time 2000

# Demo trigger key — Ctrl-G. VHS 0.11 only supports Ctrl+ modifier
# combinations; Alt/Meta and Shift are not exposed in the tape grammar.
# The plugin's documented default (C-S-s) is fine in interactive use.
set -g @tws-key 'C-g'
set -g @tws-projects-dir '/tmp/tws-demo/Projects'
set -g @tws-scores-file  '/tmp/tws-demo/state/scores.tsv'
set -g @tws-icon-style   'emoji'
# Strip the fixture's projects-dir prefix from session display names so
# the status bar shows e.g. "webapp/feature-demo-readme" instead of
# the full /private/tmp/... path. The plugin splits this on whitespace,
# so list both forms (macOS resolves /tmp -> /private/tmp).
set -g @tws-strip-prefixes '/tmp/tws-demo/Projects /private/tmp/tws-demo/Projects'

# Load the plugin directly. The first positional arg is the plugin's
# install dir; for TPM that's $TMUX_PLUGIN_MANAGER_PATH/<repo>, here it
# is the repo we're running from.
run-shell '#{d:current_file}/../tmux-worktree-sessions.tmux'
